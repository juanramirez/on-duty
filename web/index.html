<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DoctorPlan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ink: '#1f2933',
                        line: '#d8dee7',
                        mist: '#f6f8fb',
                        pine: '#0f766e',
                        coral: '#c2410c'
                    }
                }
            }
        };
    </script>
</head>
<body class="min-h-screen bg-mist text-ink antialiased">
    <main class="mx-auto flex min-h-screen w-full max-w-7xl flex-col px-4 py-5 sm:px-6 lg:px-8">
        <header class="flex flex-col gap-4 border-b border-line pb-5 md:flex-row md:items-end md:justify-between">
            <div>
                <div class="flex items-center gap-2">
                    <p class="text-sm font-semibold uppercase tracking-wide text-pine">DoctorPlan</p>
                    <span id="pricing-tier-badge" class="hidden rounded-full bg-slate-600 px-2.5 py-0.5 text-xs font-semibold uppercase tracking-wide text-white"></span>
                    <span id="version-badge" class="hidden rounded-full bg-teal-600 px-2.5 py-0.5 text-xs font-semibold uppercase tracking-wide text-white"></span>
                </div>
                <h1 id="page-title" class="mt-1 text-3xl font-semibold tracking-normal text-ink sm:text-4xl">On-duty schedule</h1>
            </div>

            <div class="flex flex-col gap-2 sm:items-end">
                <form id="schedule-form" class="flex flex-wrap items-center gap-3">
                    <button
                        id="generate-button"
                        type="submit"
                        class="h-11 rounded-md bg-pine px-5 text-sm font-semibold text-white transition hover:bg-teal-800 focus:outline-none focus:ring-4 focus:ring-pine/30 disabled:cursor-not-allowed disabled:bg-slate-400"
                    >
                        Generate
                    </button>

                    <button
                        id="stop-button"
                        type="button"
                        class="hidden h-11 rounded-md border border-red-200 bg-white px-4 text-sm font-semibold text-red-700 transition hover:bg-red-50 focus:outline-none focus:ring-4 focus:ring-red-100"
                    >
                        Stop
                    </button>

                    <button
                        id="api-toggle"
                        type="button"
                        class="flex h-11 w-11 items-center justify-center rounded-md border border-line bg-white text-slate-400 transition hover:bg-slate-50 hover:text-slate-600 focus:outline-none focus:ring-4 focus:ring-pine/20"
                    >
                        <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 0 1-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 0 1 .947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 0 1 2.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 0 1 2.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 0 1 .947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 0 1-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 0 1-2.287-.947ZM10 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" clip-rule="evenodd"/>
                        </svg>
                    </button>
                </form>

                <div id="api-panel" class="hidden w-full sm:max-w-xs">
                    <label class="grid gap-1 text-sm font-medium text-slate-700">
                        <span id="label-api">API</span>
                        <input
                            id="api-input"
                            type="url"
                            class="h-10 rounded-md border border-line bg-white px-3 text-sm text-ink outline-none ring-pine/30 transition focus:ring-4"
                            value="http://127.0.0.1:3000"
                        >
                    </label>
                </div>
            </div>
        </header>

        <section id="message" class="hidden mt-4 rounded-md border px-4 py-3 text-sm"></section>

        <section id="progress-panel" class="hidden mt-4 rounded-md border border-line bg-white p-4">
            <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
                <div>
                    <p id="progress-title" class="text-sm font-semibold text-ink">Generating schedule</p>
                    <p id="progress-detail" class="mt-1 text-sm text-slate-500">Preparing...</p>
                </div>
                <p id="progress-percent" class="text-sm font-semibold text-pine">0%</p>
            </div>
            <div class="mt-3 h-3 overflow-hidden rounded-full bg-slate-100">
                <div id="progress-bar" class="h-full w-0 rounded-full bg-pine transition-all duration-300"></div>
            </div>
            <div id="eval-panel" class="hidden mt-3">
                <p id="eval-detail" class="text-xs text-slate-500"></p>
                <div class="mt-1.5 h-1.5 overflow-hidden rounded-full bg-slate-100">
                    <div id="eval-bar" class="h-full w-0 rounded-full bg-pine/50 transition-all duration-200"></div>
                </div>
            </div>
        </section>

        <section class="grid flex-1 gap-5 py-5 lg:grid-cols-[minmax(0,30rem)_minmax(0,1fr)]">
            <aside class="min-w-0 border-b border-line pb-5 lg:border-b-0 lg:border-r lg:pb-0 lg:pr-5">
                <div class="flex items-center justify-between">
                    <h2 id="label-configuration" class="text-base font-semibold text-ink">Configuration</h2>
                    <div class="flex items-center gap-2">
                        <button
                            id="discard-config"
                            type="button"
                            disabled
                            class="rounded-md border border-line bg-white px-3 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-50 focus:outline-none focus:ring-4 focus:ring-pine/20 disabled:cursor-not-allowed disabled:opacity-40"
                        >
                            Discard
                        </button>
                        <button
                            id="save-config"
                            type="button"
                            disabled
                            class="rounded-md bg-pine px-3 py-2 text-sm font-semibold text-white transition hover:bg-teal-800 focus:outline-none focus:ring-4 focus:ring-pine/30 disabled:cursor-not-allowed disabled:opacity-40"
                        >
                            Save
                        </button>
                    </div>
                </div>

                <div class="mt-4 grid gap-1 text-sm font-medium text-slate-700">
                    <span id="label-month">Month</span>
                    <div class="flex gap-1.5">
                        <select id="month-select" class="h-11 flex-1 min-w-0 rounded-md border border-line bg-white px-2 text-base text-ink outline-none ring-pine/30 transition focus:ring-4"></select>
                        <select id="year-select" class="h-11 w-24 rounded-md border border-line bg-white px-2 text-base text-ink outline-none ring-pine/30 transition focus:ring-4"></select>
                    </div>
                </div>

                <details class="group mt-4">
                    <summary class="flex cursor-pointer list-none items-center justify-between text-base font-semibold text-ink">
                        <span id="label-doctors">Doctors</span>
                        <svg class="h-4 w-4 shrink-0 text-slate-400 transition-transform group-open:rotate-90" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M8.22 5.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L11.94 10 8.22 6.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/>
                        </svg>
                    </summary>
                    <div class="mt-3 flex gap-2">
                        <button
                            id="add-doctor"
                            type="button"
                            class="flex-1 rounded-md border border-line bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50 focus:outline-none focus:ring-4 focus:ring-pine/20"
                        >
                            Add doctor
                        </button>
                        <button
                            id="clear-doctors"
                            type="button"
                            class="rounded-md border border-red-200 bg-white px-3 py-2 text-sm font-medium text-red-600 transition hover:bg-red-50 focus:outline-none focus:ring-4 focus:ring-red-500/20"
                        >
                            Clear all
                        </button>
                    </div>
                    <div id="config-doctors" class="mt-3 grid gap-3 max-h-96 overflow-y-auto pr-1"></div>
                </details>

                <details class="group mt-6">
                    <summary class="flex cursor-pointer list-none items-center justify-between text-base font-semibold text-ink">
                        <span id="label-algorithm">Algorithm Parameters</span>
                        <svg class="h-4 w-4 shrink-0 text-slate-400 transition-transform group-open:rotate-90" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M8.22 5.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L11.94 10 8.22 6.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/>
                        </svg>
                    </summary>
                    <div id="algorithm-fields" class="mt-3 grid grid-cols-2 gap-3 max-h-72 overflow-y-auto pr-1"></div>
                    <p id="price-estimate" class="hidden mt-3 text-sm text-slate-500">
                        <span id="label-estimated-cost">Estimated cost:</span>
                        <span id="price-value" class="ml-1 font-semibold text-ink"></span>
                    </p>
                </details>

                <details class="group mt-6">
                    <summary class="flex cursor-pointer list-none items-center justify-between text-base font-semibold text-ink">
                        <span id="label-hard-constraints">Constraints</span>
                        <svg class="h-4 w-4 shrink-0 text-slate-400 transition-transform group-open:rotate-90" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M8.22 5.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L11.94 10 8.22 6.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/>
                        </svg>
                    </summary>
                    <div id="hard-constraints-list" class="mt-3 grid gap-2 max-h-96 overflow-y-auto pr-1"></div>
                </details>

                <details class="group mt-6">
                    <summary class="flex cursor-pointer list-none items-center justify-between text-base font-semibold text-ink">
                        <span id="label-soft-constraints">Preferences</span>
                        <svg class="h-4 w-4 shrink-0 text-slate-400 transition-transform group-open:rotate-90" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M8.22 5.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L11.94 10 8.22 6.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/>
                        </svg>
                    </summary>
                    <p id="label-preferences-desc" class="mt-2 text-xs text-slate-500"></p>
                    <div id="soft-constraints-list" class="mt-3 grid gap-2 max-h-96 overflow-y-auto pr-1"></div>
                </details>
            </aside>

            <section class="min-w-0">
                <div class="grid gap-3 sm:grid-cols-3">
                    <div class="rounded-md border border-line bg-white p-4">
                        <p id="label-score" class="text-xs font-semibold uppercase tracking-wide text-slate-500">Score</p>
                        <p id="score-value" class="mt-2 text-2xl font-semibold text-ink">-</p>
                    </div>
                    <div class="rounded-md border border-line bg-white p-4">
                        <p id="label-mean" class="text-xs font-semibold uppercase tracking-wide text-slate-500">Mean</p>
                        <p id="mean-value" class="mt-2 text-2xl font-semibold text-ink">-</p>
                    </div>
                    <div class="rounded-md border border-line bg-white p-4">
                        <p id="label-generation" class="text-xs font-semibold uppercase tracking-wide text-slate-500">Generation</p>
                        <p id="generation-value" class="mt-2 text-2xl font-semibold text-ink">-</p>
                    </div>
                </div>

                <div id="chart-panel" class="hidden mt-5 rounded-md border border-line bg-white p-4">
                    <canvas id="evolution-chart"></canvas>
                </div>

                <div class="mt-5 overflow-hidden rounded-md border border-line bg-white">
                    <div class="flex items-center justify-between border-b border-line px-4 py-3">
                        <h2 id="label-schedule" class="text-base font-semibold text-ink">Schedule</h2>
                        <p id="schedule-count" class="text-sm text-slate-500">No duties</p>
                    </div>
                    <div id="schedule-empty" class="px-4 py-14 text-center text-sm text-slate-500">
                        No schedule loaded.
                    </div>
                    <div id="schedule-grid" class="hidden grid grid-cols-1 divide-y divide-line sm:grid-cols-2 sm:divide-x sm:divide-y-0 lg:grid-cols-3"></div>
                </div>
            </section>
        </section>
    </main>

    <footer class="border-t border-line">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8">
            <p class="text-xs text-slate-400">DoctorPlan</p>
            <p id="app-version" class="text-xs text-slate-400"></p>
        </div>
    </footer>

            const doctors = [];
            const notAvailableDates = {};
            const desiredDutyDates = {};
            const desiredFreeDates = {};
            const offsets = {};

            for (let i = 0; i < doctorCount; i++) {
                const candidates = firstNames.filter(n => !usedFirstNames.has(n));
                const first = pick(candidates);
                usedFirstNames.add(first);
                const name = `${first} ${pick(lastNames1)} ${pick(lastNames2)}`;
                const id = toId(first) + (i + 1);

                const doctor = {id, name, notAvailableWeekdays: []};
                if (coin(0.5)) doctor.notAvailableWeekdays = pickN(allWeekdays, 1 + Math.floor(Math.random() * 2));
                if (coin(0.4)) doctor.backToBackTolerance = Math.round(Math.random() * 10) / 10;

                doctors.push(doctor);

                if (coin(0.6)) notAvailableDates[id] = randDates(1 + Math.floor(Math.random() * 3));
                if (coin(0.4)) desiredDutyDates[id] = randDates(1 + Math.floor(Math.random() * 2));
                if (coin(0.4)) desiredFreeDates[id] = randDates(1 + Math.floor(Math.random() * 2));
                if (coin(0.3)) offsets[id] = Math.floor(Math.random() * 5) - 2;
            }

            const randPref = () => Math.floor(Math.random() * 30) + 1;
            const rawPrefs = {
                avoidBackToBack: randPref(), totalDutyDaysBalance: randPref(),
                personalDesiredFreeDates: randPref(), personalDesiredDutyDates: randPref(),
                personalDutiesDistribution: randPref(), maxPossibleFreeWeekends: randPref(),
                weekendDaysBalance: randPref(), freeWeekendsBalance: randPref(),
                isolatedWeekendDaysBalance: randPref()
            };
            const prefTotal = Object.values(rawPrefs).reduce((s, v) => s + v, 0);
            const evaluatorWeights = {};
            ['commonNotConsecutiveWeekdays', 'personalNotAvailableDates', 'personalNotAvailableWeekdays']
                .forEach(k => { evaluatorWeights[k] = 33; });
            Object.entries(rawPrefs).forEach(([k, v]) => { evaluatorWeights[k] = v / prefTotal; });

            return {
                pricingTier: 'free',
                version: '0.1.0',
                doctors,
                dates: {notAvailableDates, desiredDutyDates, desiredFreeDates},
                offsets,
                algorithm: {
                    elitism: Math.round((0.005 + Math.random() * 0.02) * 1000) / 1000,
                    generationLimit: pick([100, 200, 500, 1000]),
                    mutationProbability: Math.round((0.3 + Math.random() * 0.4) * 100) / 100,
                    mutationAggresivity: Math.round((0.3 + Math.random() * 0.5) * 100) / 100,
                    populationSize: pick([200, 500, 1000, 2000]),
                    stopScore: pick([90, 95, 98, 100]),
                    tournamentSelectionRatio: Math.round((0.55 + Math.random() * 0.2) * 100) / 100,
                    islandOptions: {
                        islands: pick([2, 3, 4]),
                        migration: Math.round((0.05 + Math.random() * 0.15) * 100) / 100,
                        epoch: pick([10, 20, 30])
                    },
                    offsetRatio: Math.round((0.5 + Math.random() * 0.5) * 100) / 100,
                    evaluatorWeights
                }
            };
        };

        const loadConfig = async () => {
            configState = generateDemoConfig();
            renderConfig();
        };

        const waitForJob = async (jobId) => {
            while (true) {
                const job = await request(`/api/schedule-jobs/${jobId}`);
                renderProgress(job);

                if (job.latestResult) {
                    renderSchedule(job.latestResult, true);
                }

                if (job.status === 'completed') {
                    return job.result;
                }

                if (job.status === 'cancelled') {
                    if (!job.result) {
                        return {
                            month: job.month,
                            schedule: [],
                            score: null,
                            mean: null,
                            generation: null,
                            wasStopped: true,
                            stoppedBeforeResult: true
                        };
                    }
                    return {
                        ...job.result,
                        wasStopped: true
                    };
                }

                if (job.status === 'failed') {
                    throw new Error(job.error || 'Schedule generation failed');
                }

                await new Promise(resolve => setTimeout(resolve, 1000));
            }
        };

        const collectConfig = () => {
            const next = {
                doctors: [],
                dates: {
                    notAvailableDates: {},
                    desiredDutyDates: {},
                    desiredFreeDates: {}
                },
                offsets: {},
                algorithm: {
                    ...configState.algorithm,
                    islandOptions: {...configState.algorithm.islandOptions},
                    evaluatorWeights: {...configState.algorithm.evaluatorWeights}
                }
            };

            document.querySelectorAll('.doctor-config').forEach(row => {
                const doctor = {
                    id: row.querySelector('.doctor-id').value.trim(),
                    name: row.querySelector('.doctor-name').value.trim(),
                    notAvailableWeekdays: [...row.querySelectorAll('.doctor-weekday:checked')].map(input => input.value)
                };
                const tolerance = row.querySelector('.doctor-tolerance').value;
                if (tolerance !== '') doctor.backToBackTolerance = Number(tolerance);

                if (!doctor.id || !doctor.name) return;
                next.doctors.push(doctor);

                const notAvailable = JSON.parse(row.querySelector('.doctor-not-available')?.dataset.dates || '[]');
                const desiredDuty = JSON.parse(row.querySelector('.doctor-desired-duty')?.dataset.dates || '[]');
                const desiredFree = JSON.parse(row.querySelector('.doctor-desired-free')?.dataset.dates || '[]');
                const offset = row.querySelector('.doctor-offset').value;

                if (notAvailable.length) next.dates.notAvailableDates[doctor.id] = notAvailable;
                if (desiredDuty.length) next.dates.desiredDutyDates[doctor.id] = desiredDuty;
                if (desiredFree.length) next.dates.desiredFreeDates[doctor.id] = desiredFree;
                if (offset !== '') next.offsets[doctor.id] = Number(offset);
            });

            document.querySelectorAll('.algorithm-field').forEach(input => {
                const [root, child] = input.dataset.name.split('.');
                if (child) {
                    next.algorithm[root][child] = Number(input.value);
                } else {
                    next.algorithm[root] = Number(input.value);
                }
            });

            document.querySelectorAll('.weight-field').forEach(input => {
                next.algorithm.evaluatorWeights[input.dataset.name] = Number(input.value) / 100;
            });
            const activeHard = document.querySelectorAll('.hard-constraint-field:checked').length;
            const hardWeight = activeHard > 0 ? HARD_TOTAL_WEIGHT / activeHard : 0;
            document.querySelectorAll('.hard-constraint-field').forEach(checkbox => {
                next.algorithm.evaluatorWeights[checkbox.dataset.name] = checkbox.checked ? hardWeight : 0;
            });

            return next;
        };

        const doctorColor = (doctorId, schedule) => {
            const ids = [...new Set(schedule.map(item => item.doctor.id))];
            return colors[Math.max(0, ids.indexOf(doctorId)) % colors.length];
        };

        const renderSchedule = (payload, provisional = false) => {
            el.labelSchedule.textContent = provisional ? t.bestSoFar : t.labelSchedule;
            const schedule = payload.schedule || [];

            el.score.textContent = payload.score === null ? '-' : Number(payload.score).toFixed(2);
            el.mean.textContent = payload.mean === null ? '-' : Number(payload.mean).toFixed(2);
            if (!provisional) el.generation.textContent = payload.generation ?? '-';
            el.scheduleCount.textContent = t.duties(schedule.length);

            if (schedule.length === 0) {
                el.scheduleEmpty.classList.remove('hidden');
                el.scheduleGrid.classList.add('hidden');
                el.scheduleGrid.innerHTML = '';
                return;
            }

            el.scheduleEmpty.classList.add('hidden');
            el.scheduleGrid.classList.remove('hidden');
            el.scheduleGrid.innerHTML = schedule.map(item => `
                <article class="border-l-4 ${doctorColor(item.doctor.id, schedule)} p-4">
                    <div class="flex items-start justify-between gap-3">
                        <div>
                            <p class="text-sm font-semibold text-ink">${new Date(`${item.date}T00:00:00`).toLocaleDateString(undefined, {day: '2-digit', month: 'short'})}</p>
                            <p class="mt-1 text-xs uppercase tracking-wide text-slate-500">${item.weekday}</p>
                        </div>
                        <div class="min-w-0 text-right">
                            <p class="truncate text-sm font-semibold text-ink">${item.doctor.name}</p>
                            <p class="mt-1 text-xs text-slate-500">${item.doctor.id}</p>
                        </div>
                    </div>
                </article>
            `).join('');
        };

        el.form.addEventListener('submit', async (event) => {
            event.preventDefault();
            setBusy(true);
            showMessage({text: ''});
            resetProgress();
            initChart();

            try {
                const job = await request('/api/schedule-jobs', {
                    method: 'POST',
                    body: JSON.stringify({month: getSelectedMonth()})
                });
                activeJobId = job.id;
                renderProgress(job);

                const payload = await waitForJob(job.id);
                renderSchedule(payload);
                showMessage({
                    type: 'success',
                    text: payload.wasStopped
                        ? payload.stoppedBeforeResult
                            ? t.stoppedEarly
                            : t.stoppedWithResult(payload.month)
                        : t.generated(payload.month)
                });
            } catch (err) {
                showMessage({type: 'error', text: err.message});
            } finally {
                activeJobId = null;
                setBusy(false);
            }
        });

        el.stopButton.addEventListener('click', async () => {
            if (!activeJobId) return;

            el.stopButton.disabled = true;
            el.stopButton.textContent = 'Stopping...';

            try {
                const job = await request(`/api/schedule-jobs/${activeJobId}/cancel`, {
                    method: 'POST'
                });
                renderProgress(job);
            } catch (err) {
                showMessage({type: 'error', text: err.message});
                el.stopButton.disabled = false;
                el.stopButton.textContent = 'Stop';
            }
        });

        el.apiToggle.addEventListener('click', () => {
            el.apiPanel.classList.toggle('hidden');
        });

        // ─── Price estimation ─────────────────────────────────────────────────────
        //
        // The price reflects three dimensions of computational cost:
        //
        //   1. ALGORITHM WORK  = populationSize × islands × generationLimit
        //      How many times the fitness function runs in total.
        //      Reference: 1 000 pop × 3 islands × 500 gen = 1 500 000 evals → €3.00 (medium).
        //
        //   2. ENVIRONMENT COMPLEXITY  = numDays × numDoctors × activeConstraints
        //      Each evaluation is costlier when the schedule has more days, more
        //      doctors, or more active constraints (weight > 0).
        //      Reference: 30 days × 10 doctors × 12 constraints = 3 600.
        //
        //   3. PRICING TIER  — a server-side multiplier that scales the entire
        //      formula to the desired price range:
        //        free   → always €0 (beta / internal testing)
        //        low    → ×0.15  (≈ €0.10 – €2)
        //        medium → ×1.00  (≈ €1   – €10)
        //        high   → ×5.00  (≈ €5   – €50)
        //
        // FORMULA
        //   workRatio = (algoWork / refAlgoWork) × (envComplexity / refEnvComplexity)
        //   rawPrice  = BASE_PRICE × workRatio^EXPONENT × tierMultiplier
        //
        //   The exponent (0.4) gives sublinear scaling: doubling all parameters
        //   raises the price by ~32% rather than 100%, preventing extreme configs
        //   from producing absurd prices.
        //
        //   A per-tier floor ensures there is always a minimum charge (except for
        //   the free tier).

        const PRICE_CONFIG = {
            BASE_PRICE:    3.00,   // €  price at reference values, medium tier
            EXPONENT:      0.40,   // sublinear scaling exponent
            REF_ALGO_WORK: 1_000 * 3 * 500,  // 1 500 000
            REF_ENV:       30 * 10 * 12,      // 3 600
            TIERS: {
                free:   { multiplier: 0,    floor: 0 },
                low:    { multiplier: 0.15, floor: 0.10 },
                medium: { multiplier: 1.00, floor: 0.50 },
                high:   { multiplier: 5.00, floor: 2.50 }
            }
        };

        const estimatePrice = () => {
            if (!configState) return null;

            const year  = Number(el.yearSelect.value);
            const month = Number(el.monthSelect.value);
            const numDays = new Date(year, month, 0).getDate(); // last day of selected month

            const { populationSize, generationLimit, islandOptions, evaluatorWeights } = configState.algorithm;
            const islands          = islandOptions?.islands || 1;
            const numDoctors       = configState.doctors.length;
            const activeConstraints = Object.values(evaluatorWeights || {}).filter(w => w > 0).length;

            const algoWork     = populationSize * islands * generationLimit;
            const envComplexity = numDays * numDoctors * Math.max(1, activeConstraints);
            const workRatio    = (algoWork / PRICE_CONFIG.REF_ALGO_WORK) * (envComplexity / PRICE_CONFIG.REF_ENV);

            const tier = PRICE_CONFIG.TIERS[configState.pricingTier] ?? PRICE_CONFIG.TIERS.free;
            if (tier.multiplier === 0) return 0;

            const raw = PRICE_CONFIG.BASE_PRICE * Math.pow(workRatio, PRICE_CONFIG.EXPONENT) * tier.multiplier;
            return Math.max(tier.floor, raw);
        };

        const currencyFmt = new Intl.NumberFormat(locale, {style: 'currency', currency: 'EUR', minimumFractionDigits: 2, maximumFractionDigits: 2});

        const updatePrice = () => {
            const price = estimatePrice();
            if (price === null) {
                el.priceEstimate.classList.add('hidden');
                return;
            }
            el.priceEstimate.classList.remove('hidden');
            el.priceValue.textContent = price === 0 ? t.freeLabel : currencyFmt.format(price);
        };

        el.monthSelect.addEventListener('change', updatePrice);
        el.yearSelect.addEventListener('change', updatePrice);

        el.clearDoctors.addEventListener('click', () => {
            if (!confirm(t.clearDoctorsConfirm)) return;
            configState = collectConfig();
            configState.doctors = [];
            configState.dates = {notAvailableDates: {}, desiredDutyDates: {}, desiredFreeDates: {}};
            configState.offsets = {};
            renderConfig();
            setDirty(true);
        });

        el.addDoctor.addEventListener('click', () => {
            configState = collectConfig();
            const index = configState.doctors.length + 1;
            configState.doctors.push({
                id: `doctor${index}`,
                name: `Doctor ${index}`,
                notAvailableWeekdays: [],
                backToBackTolerance: 0.5
            });
            renderConfig();
            setDirty(true);
        });

        el.configAside.addEventListener('input', (event) => {
            if (event.target.classList.contains('weight-field')) {
                const changed = event.target;
                const newPct = Math.min(100, Math.max(0, Number(changed.value) || 0));
                changed.value = newPct;
                const others = [...document.querySelectorAll('.weight-field')].filter(f => f !== changed);
                const othersTotal = others.reduce((sum, f) => sum + (Number(f.value) || 0), 0);
                const remaining = 100 - newPct;
                if (othersTotal === 0) {
                    const share = Math.round(remaining / others.length * 10) / 10;
                    others.forEach(f => { f.value = share; });
                } else {
                    others.forEach(f => {
                        f.value = Math.round(Number(f.value) / othersTotal * remaining * 10) / 10;
                    });
                }
            }
            setDirty(true);
        });
        el.configAside.addEventListener('change', () => setDirty(true));

        el.configDoctors.addEventListener('click', (event) => {
            if (event.target.classList.contains('remove-doctor')) {
                event.target.closest('.doctor-config')?.remove();
                setDirty(true);
                return;
            }

            const addBtn = event.target.closest('.add-date');
            if (addBtn) {
                const picker = addBtn.closest('.date-picker');
                const input = picker.querySelector('.date-input');
                const ddmmyyyy = fromInputDate(input.value);
                if (!ddmmyyyy) return;
                const dates = JSON.parse(picker.dataset.dates || '[]');
                if (dates.includes(ddmmyyyy)) return;
                dates.push(ddmmyyyy);
                dates.sort((a, b) => a.split('/').reverse().join('').localeCompare(b.split('/').reverse().join('')));
                picker.dataset.dates = JSON.stringify(dates);
                picker.querySelector('.date-chips').innerHTML = dates.map(dateChipHtml).join('');
                input.value = '';
                setDirty(true);
                return;
            }

            const removeBtn = event.target.closest('.remove-date');
            if (removeBtn) {
                const picker = removeBtn.closest('.date-picker');
                const dates = JSON.parse(picker.dataset.dates || '[]').filter(d => d !== removeBtn.dataset.date);
                picker.dataset.dates = JSON.stringify(dates);
                picker.querySelector('.date-chips').innerHTML = dates.map(dateChipHtml).join('');
                setDirty(true);
                return;
            }

            const header = event.target.closest('.doctor-header');
            if (header) {
                header.nextElementSibling.classList.toggle('hidden');
            }
        });

        el.discardConfig.addEventListener('click', () => {
            const openDetails = new Set(
                [...document.querySelectorAll('aside details')].flatMap((d, i) => d.open ? [i] : [])
            );
            const openDoctors = new Set(
                [...document.querySelectorAll('.doctor-config')].flatMap((card, i) =>
                    !card.querySelector('.doctor-body').classList.contains('hidden') ? [i] : []
                )
            );

            renderConfig();
            showMessage({text: ''});

            [...document.querySelectorAll('aside details')].forEach((d, i) => {
                if (openDetails.has(i)) d.open = true;
            });
            document.querySelectorAll('.doctor-config').forEach((card, i) => {
                if (openDoctors.has(i)) card.querySelector('.doctor-body').classList.remove('hidden');
            });
        });

        el.saveConfig.addEventListener('click', async () => {
            showMessage({text: ''});
            el.saveConfig.disabled = true;
            el.saveConfig.textContent = t.saving;

            try {
                configState = await request('/api/config', {
                    method: 'PUT',
                    body: JSON.stringify(collectConfig())
                });
                renderConfig();
                showMessage({type: 'success', text: t.configSaved});
            } catch (err) {
                showMessage({type: 'error', text: err.message});
            } finally {
                el.saveConfig.disabled = false;
                el.saveConfig.textContent = t.save;
            }
        });

        const floatingTooltip = document.createElement('div');
        floatingTooltip.className = 'fixed z-50 max-w-xs rounded-md bg-slate-800 px-3 py-2 text-xs leading-relaxed text-white shadow-lg pointer-events-none';
        floatingTooltip.style.display = 'none';
        document.body.appendChild(floatingTooltip);

        document.addEventListener('mouseover', (e) => {
            const target = e.target.closest('[data-tooltip]');
            if (!target) return;
            floatingTooltip.textContent = target.dataset.tooltip;
            floatingTooltip.style.display = 'block';
        });

        document.addEventListener('mouseout', (e) => {
            if (!e.relatedTarget?.closest('[data-tooltip]')) {
                floatingTooltip.style.display = 'none';
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (floatingTooltip.style.display === 'none') return;
            const x = e.clientX + 14;
            const y = e.clientY + 14;
            const w = floatingTooltip.offsetWidth;
            const h = floatingTooltip.offsetHeight;
            floatingTooltip.style.left = `${Math.min(x, window.innerWidth - w - 8)}px`;
            floatingTooltip.style.top = `${Math.min(y, window.innerHeight - h - 8)}px`;
        });

        loadConfig().catch(err => showMessage({type: 'error', text: err.message}));
    </script>
</body>
</html>
